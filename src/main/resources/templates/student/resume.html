<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resume Examination - Exam Portal</title>
    <!-- Google Fonts (Outfit & Inter) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@500;600;700;800&display=swap" rel="stylesheet">
    <!-- Bootstrap CSS & Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #f5f7fa 0%, #e4e8f0 100%);
            --card-bg: rgba(255, 255, 255, 0.95);
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --primary-light: rgba(37, 99, 235, 0.08);
            --accent: #4f46e5;
            --text-dark: #1e293b;
            --text-muted: #64748b;
            --warning: #f59e0b;
            --warning-light: rgba(245, 158, 11, 0.08);
            --danger: #ef4444;
            --danger-light: rgba(239, 68, 68, 0.08);
            --success: #10b981;
            --success-light: rgba(16, 185, 129, 0.08);
            --border-color: #e2e8f0;
            --transition-smooth: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body.dark-theme {
            --bg-gradient: linear-gradient(135deg, #090d16 0%, #111827 100%);
            --card-bg: rgba(17, 24, 39, 0.95);
            --text-dark: #f9fafb;
            --text-muted: #94a3b8;
            --border-color: rgba(255, 255, 255, 0.08);
            --primary-light: rgba(99, 102, 241, 0.15);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-gradient);
            color: var(--text-dark);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 1rem;
        }

        .resume-container {
            max-width: 600px;
            width: 100%;
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(15, 23, 42, 0.08), 0 1px 3px rgba(15, 23, 42, 0.02);
            border: 1px solid var(--border-color);
            padding: 3rem;
            position: relative;
            overflow: hidden;
            transition: var(--transition-smooth);
        }

        .resume-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 6px;
            background: linear-gradient(90deg, var(--primary), var(--accent));
        }

        h3.title {
            font-family: 'Outfit', sans-serif;
            font-weight: 800;
            color: var(--text-dark);
            text-align: center;
            font-size: 1.85rem;
            letter-spacing: -0.02em;
            margin-bottom: 1.5rem;
        }

        .alert-box {
            background: var(--warning-light);
            border-left: 4px solid var(--warning);
            padding: 1.25rem;
            border-radius: 12px;
            margin-bottom: 2rem;
            display: flex;
            align-items: flex-start;
            gap: 12px;
            color: var(--text-dark);
        }

        .stat-card {
            background: var(--primary-light);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 1.25rem 1.5rem;
            margin-bottom: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: var(--transition-smooth);
        }

        .stat-label {
            font-weight: 600;
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        .stat-value {
            font-family: 'Outfit', sans-serif;
            font-weight: 800;
            color: var(--primary);
            font-size: 1.2rem;
        }

        .form-select {
            border-radius: 12px;
            padding: 0.75rem 1rem;
            border: 1.5px solid var(--border-color);
            font-weight: 500;
            background-color: var(--card-bg);
            color: var(--text-dark);
        }

        .form-select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.15);
        }

        .btn-resume {
            background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
            color: #ffffff !important;
            padding: 0.9rem 2.5rem;
            font-family: 'Outfit', sans-serif;
            font-weight: 700;
            font-size: 1.1rem;
            letter-spacing: 0.03em;
            border-radius: 12px;
            border: none;
            box-shadow: 0 10px 25px rgba(37, 99, 235, 0.35);
            transition: var(--transition-smooth);
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 2rem;
        }

        .btn-resume:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px rgba(37, 99, 235, 0.45);
        }
    </style>
</head>
<body>
    <div class="resume-container">
        <h3 class="title">EXAM IN PROGRESS</h3>
        
        <div class="alert-box">
            <i class="bi bi-exclamation-triangle-fill text-warning fs-4"></i>
            <div>
                <strong class="d-block mb-1">Session Interrupted</strong>
                <span class="small text-muted" style="color: var(--text-muted) !important;">
                    Your previous examination session was interrupted due to a power failure, browser crash, or internet disconnection. You can resume and continue your exam.
                </span>
            </div>
        </div>

        <div class="stat-card">
            <span class="stat-label">Subject / Exam:</span>
            <span class="stat-value" th:text="${examName}">Subject Name</span>
        </div>

        <div class="stat-card">
            <span class="stat-label">Last Saved:</span>
            <span class="stat-value" th:text="${lastSaved}">2026-06-06 10:45:00</span>
        </div>

        <div class="stat-card">
            <span class="stat-label">Remaining Time:</span>
            <span class="stat-value text-danger" th:text="${remainingTimeFormatted}">01:50:00</span>
        </div>

        <form th:action="@{/student/exam/resume}" method="post" class="mt-4">
            <input type="hidden" name="attemptId" th:value="${attemptId}">
            <input type="hidden" name="type" th:value="${type}">
            
            <div class="mb-3">
                <label class="form-label fw-bold small text-muted mb-2">Select Interruption Reason</label>
                <select name="reason" class="form-select" required>
                    <option value="Power Failure" selected>Power Failure</option>
                    <option value="Internet Disconnection">Internet Disconnection</option>
                    <option value="System Restart">System Restart</option>
                    <option value="Browser Crash">Browser Crash</option>
                    <option value="Unexpected Interruption">Unexpected Interruption</option>
                </select>
            </div>

            <button type="submit" class="btn-resume">
                RESUME EXAM <i class="bi bi-arrow-right-circle-fill"></i>
            </button>
        </form>
    </div>

    <!-- Global Theme Engine -->
    <script src="/js/canvas.js"></script>
</body>
</html>
