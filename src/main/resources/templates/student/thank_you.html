<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You</title>
    <!-- Premium Global Theme Style & Toggle -->
    <link href="/css/canvas.css" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f0fdf4;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .thank-you-card {
            background: #ffffff;
            border-radius: 16px;
            padding: 50px 40px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            text-align: center;
            max-width: 500px;
            width: 100%;
            border: 1px solid #dcfce7;
        }
        .success-icon {
            width: 80px;
            height: 80px;
            background-color: #22c55e;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            margin: 0 auto 20px;
            box-shadow: 0 4px 15px rgba(34, 197, 94, 0.3);
        }
        h2 {
            font-weight: 700;
            color: #166534;
            margin-bottom: 15px;
        }
        p {
            color: #4b5563;
            font-size: 1.1rem;
            margin-bottom: 30px;
            line-height: 1.6;
        }
        .btn-dashboard {
            background-color: #16a34a;
            border: none;
            padding: 12px 30px;
            font-weight: 600;
            border-radius: 8px;
            transition: background-color 0.3s;
        }
        .btn-dashboard:hover {
            background-color: #15803d;
        }
    </style>
</head>
<body>

    <div class="thank-you-card">
        <div class="success-icon">
            ✓
        </div>
        <h2>Thank You!</h2>
        <p>👉 Your exam and feedback have been successfully submitted. You may now close this window or return to the dashboard.</p>
        
        <a href="/student/exam/dashboard" class="btn btn-success btn-dashboard shadow-sm">
            Return to Dashboard
        </a>
        <!-- Global Theme Engine -->
        <script src="/js/canvas.js"></script>
    </div>

</body>
</html>
