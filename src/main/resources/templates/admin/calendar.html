                setAssignedTo('');
                setEventType('TASK');

                setSelectedUserIds([]);
                setUserSearch('');
                setDropdownOpen(false);
            }
        }, [editEvent, selectedDate, isOpen]);

        if (!isOpen) return null;

        const handleSubmit = (e) => {
            if (e) e.preventDefault();
            if (!title.trim()) return;

            let finalSharedWith = '';
            if (visibility === 'SHARED' && selectedUserIds.length > 0) {
                finalSharedWith = ',' + selectedUserIds.join(',') + ',';
            }

            onSave({
                id: editEvent ? editEvent.id : null,
                title,
                description,
                category,
                eventType,
                priority,
                visibility,
                assignedTo,
                dateStr,
                startTime,
                endTime,
                room,
                sharedWith: finalSharedWith
            });
            onClose();
        };

        const getPopoverStyle = () => {
            if (!popoverCoords) return {};
            const width = 360;
            const height = 240;
            const padding = 20;

            let left = popoverCoords.x + 10;
            let top = popoverCoords.y - 80;

            if (typeof window !== 'undefined') {
                if (left + width > window.innerWidth) {
                    left = popoverCoords.x - width - 10;
                }
                if (top + height > window.innerHeight) {
                    top = window.innerHeight - height - padding;
                }
                if (top < padding) {
                    top = padding;
                }
            }

            return {
                position: 'absolute',
                left: `${left}px`,
                top: `${top}px`,
                zIndex: 50
            };
        };

        if (mode === 'quick') {
            return (
                <div
                    style={{
                        ...getPopoverStyle(),
                        background: 'linear-gradient(135deg, #0f0f1a 0%, #141428 100%)',
                        border: '1px solid rgba(99,102,241,0.3)',
                        boxShadow: '0 20px 60px rgba(0,0,0,0.6), 0 0 30px rgba(99,102,241,0.15)',
                        borderRadius: '16px',
                        padding: '18px',
                        width: '320px',
                        zIndex: 50,
                    }}
                    className="animate-modal"
                >
                    <div className="flex justify-between items-center mb-3">
                        <span className="text-[10px] font-extrabold uppercase tracking-widest" style={{color:'#5a5d80'}}>Quick Add Event</span>
                        <button onClick={onClose} className="cursor-pointer transition-colors" style={{color:'#5a5d80'}} onMouseEnter={e=>e.currentTarget.style.color='#f0f0ff'} onMouseLeave={e=>e.currentTarget.style.color='#5a5d80'}>
                            <i className="bi bi-x-lg text-sm"></i>
                        </button>
                    </div>

                    <form onSubmit={handleSubmit} className="space-y-3">
                        <input
                            type="text"
                            placeholder="Event title..."
                            value={title}
                            onChange={(e) => setTitle(e.target.value)}
                            className="w-full text-[14px] font-semibold outline-none bg-transparent pb-2"
                            style={{borderBottom:'1px solid rgba(99,102,241,0.3)', color:'#f0f0ff'}}
                            autoFocus
                            required
                        />

                        <div className="flex items-center gap-2 text-[11px]" style={{color:'#5a5d80'}}>
                            <i className="bi bi-clock"></i>
                            <span>{dateStr} • {startTime} – {endTime}</span>
                        </div>

                        {/* Category quick pills */}
                        <div className="flex items-center gap-1.5 flex-wrap">
                            {['admin', 'exams', 'tasks', 'holidays'].map(cat => {
                                const catBg = {admin:'#3b82f6',exams:'#6366f1',tasks:'#f59e0b',holidays:'#10b981'};
                                const isActive = category === cat;
                                return (
                                    <button
                                        key={cat}
                                        type="button"
                                        onClick={() => {
                                            setCategory(cat);
                                            if (cat === 'holidays') setEventType('HOLIDAY');
                                            else if (cat === 'exams') setEventType('EXAM');
                                            else setEventType('TASK');
                                        }}
                                        className="px-2.5 py-1 rounded-lg text-[10px] font-bold uppercase transition-all cursor-pointer"
                                        style={{
                                            background: isActive ? catBg[cat] : 'rgba(255,255,255,0.05)',
                                            color: isActive ? 'white' : '#5a5d80',
                                            border: isActive ? `1px solid ${catBg[cat]}` : '1px solid rgba(255,255,255,0.08)',
                                            boxShadow: isActive ? `0 0 10px ${catBg[cat]}60` : 'none',
                                        }}
                                    >
                                        {cat}
                                    </button>
                                );
                            })}
                        </div>

                        <div className="flex items-center justify-between pt-2" style={{borderTop:'1px solid rgba(99,102,241,0.12)'}}>
                            <button
                                type="button"
                                onClick={() => setMode('full')}
                                className="text-[11px] font-semibold cursor-pointer transition-colors"
                                style={{color:'#6366f1'}}
                            >
                                More options
                            </button>
                            <div className="flex gap-2">
                                <button
                                    type="button"
                                    onClick={onClose}
                                    className="px-3 py-1 text-[11px] font-semibold rounded-lg cursor-pointer transition-all"
                                    style={{color:'#5a5d80', background:'rgba(255,255,255,0.05)'}}
                                >
                                    Cancel
                                </button>
                                <button
                                    type="submit"
                                    className="px-4 py-1 text-[11px] font-bold rounded-lg cursor-pointer"
                                    style={{background:'linear-gradient(135deg,#6366f1,#8b5cf6)', color:'white', boxShadow:'0 0 12px rgba(99,102,241,0.5)'}}
                                >
                                    Save
                                </button>
                            </div>
                        </div>
                    </form>
                </div>
            );
        }

        // Full modal centered overlay mode
        return (
            <div className="fixed inset-0 flex items-center justify-center z-50 p-4 font-sans select-text modal-backdrop-premium animate-modal">
                <div className="w-full max-w-md rounded-2xl overflow-hidden"
                    style={{
                        background:'linear-gradient(135deg,#0f0f1a 0%,#141428 100%)',
                        border:'1px solid rgba(99,102,241,0.3)',
                        boxShadow:'0 30px 80px rgba(0,0,0,0.7), 0 0 40px rgba(99,102,241,0.15)',
                        color:'#f0f0ff',
                    }}
                >
                    {/* Header */}
                    <div className="flex items-center justify-between px-5 py-4" style={{borderBottom:'1px solid rgba(99,102,241,0.15)'}}>
                        <div className="flex items-center gap-2">
                            <div className="w-5 h-5 rounded-md flex items-center justify-center" style={{background:'linear-gradient(135deg,#6366f1,#8b5cf6)'}}>
                                <i className="bi bi-calendar-plus text-white" style={{fontSize:'10px'}}></i>
                            </div>
                            <h2 className="text-[13px] font-bold" style={{color:'#f0f0ff'}}>{editEvent ? 'Edit Event' : 'New Event'}</h2>
                        </div>
                        <button onClick={onClose} className="cursor-pointer transition-colors rounded-lg p-1" style={{color:'#5a5d80'}} onMouseEnter={e=>e.currentTarget.style.color='#f0f0ff'} onMouseLeave={e=>e.currentTarget.style.color='#5a5d80'}>
                            <i className="bi bi-x-lg text-sm"></i>
                        </button>
                    </div>

                    {/* Form */}
                    <form onSubmit={handleSubmit} className="p-5 space-y-3.5">
                        {/* Title */}
                        <div>
                            <input
                                type="text"
                                placeholder="Add title"
                                value={title}
                                onChange={(e) => setTitle(e.target.value)}
                                className="w-full text-base font-semibold border-b border-gray-300 dark:border-[#3c3c3c] focus:border-[#1a73e8] outline-none pb-1.5 bg-transparent text-gray-900 dark:text-white placeholder-gray-400 dark:placeholder-gray-500"
                                required
                                autoFocus
                            />
                        </div>

                        {/* Date & Time fields */}
                        <div className="grid grid-cols-3 gap-2 items-center">
                            <div className="col-span-1">
                                <label className="block text-[10px] font-bold text-gray-400 uppercase mb-1">Date</label>
                                <input
                                    type="date"
                                    value={dateStr}
                                    onChange={(e) => setDateStr(e.target.value)}
                                    className="bg-transparent border border-gray-300 dark:border-[#3c3c3c] p-1.5 rounded text-xs w-full text-gray-800 dark:text-white outline-none"
                                    required
                                />
                            </div>
                            <div className="col-span-1">
                                <label className="block text-[10px] font-bold text-gray-400 uppercase mb-1">Start Time</label>
                                <input
                                    type="time"
                                    value={startTime}
                                    onChange={(e) => setStartTime(e.target.value)}
                                    className="bg-transparent border border-gray-300 dark:border-[#3c3c3c] p-1.5 rounded text-xs w-full text-gray-800 dark:text-white outline-none"
                                    required
                                />
                            </div>
                            <div className="col-span-1">
                                <label className="block text-[10px] font-bold text-gray-400 uppercase mb-1">End Time</label>
                                <input
                                    type="time"
                                    value={endTime}
                                    onChange={(e) => setEndTime(e.target.value)}
                                    className="bg-transparent border border-gray-300 dark:border-[#3c3c3c] p-1.5 rounded text-xs w-full text-gray-800 dark:text-white outline-none"
                                    required
                                />
                            </div>
                        </div>

                        {/* Event Category & Type selection */}
                        <div className="flex gap-2 items-center">
                            <span className="text-xs text-gray-400 w-20">Category:</span>
                            <select
                                value={category}
                                onChange={(e) => {
                                    setCategory(e.target.value);
                                    if (e.target.value === 'holidays') setEventType('HOLIDAY');
                                    else if (e.target.value === 'exams') setEventType('EXAM');
                                    else setEventType('TASK');
                                }}
                                className="flex-1 bg-white dark:bg-[#1e1e1e] border border-gray-300 dark:border-[#3c3c3c] p-1.5 rounded text-xs text-gray-800 dark:text-white outline-none"
                            >
                                <option value="admin">Admin (Blue)</option>
                                <option value="exams">Exams (Purple)</option>
                                <option value="tasks">Tasks (Red)</option>
                                <option value="holidays">Holidays (Green)</option>
                                <option value="birthdays">Birthdays (Light Green)</option>
                            </select>
                        </div>

                        {/* Priority Selector */}
                        <div className="flex gap-2 items-center">
                            <span className="text-xs text-gray-400 w-20">Priority:</span>
                            <select
                                value={priority}
                                onChange={(e) => setPriority(e.target.value)}
                                className="flex-1 bg-white dark:bg-[#1e1e1e] border border-gray-300 dark:border-[#3c3c3c] p-1.5 rounded text-xs text-gray-800 dark:text-white outline-none"
                            >
                                <option value="LOW">Low</option>
                                <option value="MEDIUM">Medium</option>
                                <option value="HIGH">High</option>
                            </select>
                        </div>

                        {/* Assigned To selector */}
                        <div className="flex gap-2 items-center">
                            <span className="text-xs text-gray-400 w-20">Assignee:</span>
                            <select
                                value={assignedTo}
                                onChange={(e) => {
                                    const val = e.target.value;
                                    setAssignedTo(val);
                                    if (val === '') {
                                        setVisibility('PRIVATE');
                                    } else if (val === 'Everyone') {
                                        setVisibility('PUBLIC');
                                    } else {
                                        setVisibility('SHARED');
                                    }
                                }}
                                className="flex-1 bg-white dark:bg-[#1e1e1e] border border-gray-300 dark:border-[#3c3c3c] p-1.5 rounded text-xs text-gray-800 dark:text-white outline-none"
                            >
                                <option value="">Assign to Me</option>
                                <option value="Everyone">Everyone (Visible to all)</option>
                                {allAdmins.map(admin => (
                                    <option key={admin} value={admin}>{admin}</option>
                                ))}
                            </select>
                        </div>

                        {/* Visibility Selector */}
                        <div className="flex gap-2 items-center">
                            <span className="text-xs text-gray-400 w-20">Visibility:</span>
                            <select
                                value={visibility}
                                onChange={(e) => setVisibility(e.target.value)}
                                className="flex-1 bg-white dark:bg-[#1e1e1e] border border-gray-300 dark:border-[#3c3c3c] p-1.5 rounded text-xs text-gray-800 dark:text-white outline-none"
                            >
                                <option value="PRIVATE">🔒 Private</option>
                                <option value="SHARED">👥 Shared</option>
                                <option value="PUBLIC">🌍 Public</option>
                            </select>
                        </div>
                        {/* Visibility Explanation */}
                        <div className="text-[10px] text-gray-400 -mt-2 space-y-0.5" style={{ paddingLeft: '88px' }}>
                            {visibility === 'PRIVATE' && <div>Private: Only you can view.</div>}
                            {visibility === 'SHARED' && <div>Shared: Only creator and assigned user can view.</div>}
                            {visibility === 'PUBLIC' && <div>Public: Visible to all admins.</div>}
                        </div>

                        {/* Dynamic User Selection for Shared Tasks */}
                        <div 
                            ref={searchContainerRef}
                            className={`transition-all duration-300 ${visibility === 'SHARED' ? 'max-h-[500px] opacity-100 overflow-visible' : 'max-h-0 opacity-0 overflow-hidden pointer-events-none'}`}
                        >
                            <div className="flex flex-col gap-2 p-2.5 rounded bg-gray-50 dark:bg-[#202124] border border-gray-200 dark:border-[#3c3c3c]">
                                <label className="block text-[10px] font-bold text-gray-400 uppercase">Shared With:</label>
                                
                                {/* Selected users chips */}
                                <div className="flex flex-wrap gap-1.5 max-h-24 overflow-y-auto">
                                    {selectedUserIds.length === 0 ? (
                                        <span className="text-[11px] text-gray-400 italic">No users selected yet</span>
                                    ) : (
                                        selectedUserIds.map(id => {
                                            const user = usersList.find(u => String(u.id) === String(id));
                                            return (
                                                <div key={id} className="flex items-center gap-1 px-2.5 py-0.5 rounded-full bg-[#1a73e8] text-white text-[10px] font-medium">
                                                    <span>{user ? user.displayName : `User ${id}`}</span>
                                                    <button
                                                        type="button"
                                                        onClick={() => setSelectedUserIds(prev => prev.filter(uid => uid !== id))}
                                                        className="hover:text-red-300 font-bold focus:outline-none ml-1 cursor-pointer text-xs"
                                                    >
                                                        ×
                                                    </button>
                                                </div>
                                            );
                                        })
                                    )}
                                </div>

                                {/* Search input & dropdown */}
                                <div className="relative">
                                    <input
                                        type="text"
                                        placeholder="Search user..."
                                        value={userSearch}
                                        onChange={(e) => {
                                            setUserSearch(e.target.value);
                                            setDropdownOpen(true);
                                        }}
                                        onFocus={() => setDropdownOpen(true)}
                                        className="w-full bg-white dark:bg-[#1e1e1e] border border-gray-300 dark:border-[#3c3c3c] p-1.5 rounded text-xs text-gray-800 dark:text-white outline-none"
                                    />
                                    {dropdownOpen && (
                                        <div className="absolute left-0 right-0 mt-1 max-h-36 overflow-y-auto bg-white dark:bg-[#2d2d2d] border border-gray-300 dark:border-[#3c3c3c] rounded shadow-lg z-50">
                                            {(() => {
                                                const query = userSearch.toLowerCase().trim();
                                                const filtered = usersList.filter(u => {
                                                    if (u.username?.toLowerCase() === adminName?.toLowerCase()) return false;
                                                    if (!query) return true;
                                                    return (
                                                        u.displayName?.toLowerCase().includes(query) ||
                                                        u.email?.toLowerCase().includes(query) ||
                                                        u.role?.toLowerCase().includes(query)
                                                    );
                                                });
                                                
                                                if (filtered.length === 0) {
                                                    return <div className="p-2 text-xs text-gray-400 italic text-center">No users found</div>;
                                                }
                                                
                                                return filtered.map(u => {
                                                    const isChecked = selectedUserIds.includes(u.id);
                                                    return (
                                                        <div
                                                            key={u.id}
                                                            onClick={() => {
                                                                if (isChecked) {
                                                                    setSelectedUserIds(prev => prev.filter(id => id !== u.id));
                                                                } else {
                                                                    setSelectedUserIds(prev => [...prev, u.id]);
                                                                }
                                                            }}
                                                            className="flex items-center justify-between p-2 hover:bg-gray-100 dark:hover:bg-[#3c3c3c] cursor-pointer text-xs border-b last:border-0 border-gray-100 dark:border-[#3c3c3c]"
                                                        >
                                                            <div className="flex flex-col">
                                                                <span className="font-semibold text-gray-850 dark:text-white">{u.displayName}</span>
                                                                <span className="text-[10px] text-gray-400">{u.role} • {u.email}</span>
                                                            </div>
                                                            <div className={`w-3.5 h-3.5 rounded-[3px] flex items-center justify-center border transition-all ${isChecked ? 'border-transparent text-white bg-[#1a73e8]' : 'border-gray-400 dark:border-gray-650 bg-transparent'}`}>
                                                                {isChecked && <i className="bi bi-check-lg text-[10px]"></i>}
                                                            </div>
                                                        </div>
                                                    );
                                                });
                                            })()}
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>

                        {/* Room Location (Conflict Audit Target) */}
                        <div className="flex gap-2 items-center">
                            <span className="text-xs text-gray-400 w-20">Room:</span>
                            <input
                                type="text"
                                placeholder="Conference A, Lab B (triggers checks)"
                                value={room}
                                onChange={(e) => setRoom(e.target.value)}
                                className="flex-1 bg-transparent border border-gray-300 dark:border-[#3c3c3c] p-1.5 rounded text-xs text-gray-800 dark:text-white outline-none"
                            />
                        </div>

                        {/* Notes / Description */}
                        <div>
                            <label className="block text-[10px] font-bold text-gray-400 uppercase mb-1">Notes</label>
                            <textarea
                                placeholder="Add optional details..."
                                value={description}
                                onChange={(e) => setDescription(e.target.value)}
                                rows="3"
                                className="w-full bg-transparent border border-gray-350 dark:border-[#3c3c3c] p-2 rounded text-xs text-gray-800 dark:text-white outline-none resize-none"
                            />
                        </div>

                        {/* Footer buttons */}
                        <div className="flex justify-end gap-2 pt-3 border-t border-gray-200 dark:border-[#3c3c3c]">
                            <button
                                type="button"
                                onClick={onClose}
                                className="px-4 py-1.5 text-xs font-semibold rounded-lg cursor-pointer transition-all"
                                style={{color:'#a5a8d4', background:'rgba(99,102,241,0.08)', border:'1px solid rgba(99,102,241,0.2)'}}
                            >
                                Cancel
                            </button>
                            <button
                                type="submit"
                                className="px-5 py-1.5 text-xs font-bold rounded-lg cursor-pointer"
                                style={{background:'linear-gradient(135deg,#6366f1,#8b5cf6)', color:'white', boxShadow:'0 0 14px rgba(99,102,241,0.5)'}}
                            >
                                Save
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        );
    }

    // --- COMPONENT: EVENTDETAILPOPOVER ---
    function EventDetailPopover({
        isOpen,
        event,
        coords,
        onClose,
        onEditClick,
        onDeleteClick,
        onToggleComplete,
        conflicts = [],
        adminName,
        usersList = []
    }) {
        if (!isOpen || !event) return null;

        const start = new Date(event.start);
        const end = new Date(event.end);

        const categoryLabels = {
            admin: 'Admin Event',
            exams: 'Examination Session',
            tasks: 'General Task',
            holidays: 'Public Holiday',
            birthdays: 'Birthday Reminder'
        };

        const catColors = {
            admin: '#1a73e8',
            exams: '#7986cb',
            tasks: '#0b8043',
            holidays: '#0f9d58',
            birthdays: '#33b679'
        };

        const cat = getEventCategory(event);
        const label = categoryLabels[cat] || 'Calendar Event';
        const color = catColors[cat] || '#64748b';

        const getStyle = () => {
            if (!coords) return {};
            const width = 340;
            const height = 280;
            const padding = 20;

            let left = coords.x + 10;
            let top = coords.y - 80;

            if (typeof window !== 'undefined') {
                if (left + width > window.innerWidth) {
                    left = coords.x - width - 10;
                }
                if (top + height > window.innerHeight) {
                    top = window.innerHeight - height - padding;
                }
                if (top < padding) {
                    top = padding;
                }
            }

            return {
                position: 'absolute',
                left: `${left}px`,
                top: `${top}px`,
                zIndex: 40
            };
        };

        const canDelete = (event.createdBy?.toLowerCase() === adminName?.toLowerCase() || event.createdBy === 'System') && event.eventType !== 'HOLIDAY';
        const isCreator = event.createdBy?.toLowerCase() === adminName?.toLowerCase();
        const isAssignee = event.assignedTo?.toLowerCase() === adminName?.toLowerCase();
        const isEveryone = ['everyone', 'all'].includes(event.assignedTo?.toLowerCase());
        const isShared = event.visibility?.toUpperCase() === 'SHARED';
        const isPublic = event.visibility?.toUpperCase() === 'PUBLIC';
        const canComplete = isCreator || isAssignee || isEveryone || isShared || isPublic;

        return (
            <div 
                style={getStyle()} 
                className="w-[330px] bg-white dark:bg-[#2d2d2d] rounded-xl border border-gray-205 dark:border-[#3c3c3c] text-gray-800 dark:text-[#e8eaed] font-sans overflow-hidden"
            >
                {/* Actions top bar */}
                <div className="flex items-center justify-between px-3.5 py-1.5 bg-gray-50 dark:bg-[#202124] border-b border-gray-205 dark:border-[#3c3c3c]">
                    <div className="flex items-center gap-2">
                        <div className="w-3.5 h-3.5 rounded-full" style={{ backgroundColor: color }} />
                        <span className="text-[11px] font-bold uppercase tracking-wider text-gray-500 dark:text-gray-450">
                            {label}
                        </span>
                    </div>

                    <div className="flex items-center gap-0.5">
                        {event.eventType !== 'HOLIDAY' && (
                            <button onClick={() => onEditClick(event)} className="p-1.5 rounded-full hover:bg-gray-200 dark:hover:bg-[#3c3c3c] text-gray-600 dark:text-gray-300" title="Edit">
                                <i className="bi bi-pencil-fill text-xs"></i>
                            </button>
                        )}
                        {canDelete && (
                            <button onClick={() => onDeleteClick(event.id)} className="p-1.5 rounded-full hover:bg-gray-200 dark:hover:bg-[#3c3c3c] text-red-650 dark:text-red-400" title="Delete">
                                <i className="bi bi-trash-fill text-xs"></i>
                            </button>
                        )}
                        <button onClick={onClose} className="p-1.5 rounded-full hover:bg-gray-200 dark:hover:bg-[#3c3c3c] text-gray-450 dark:text-gray-400">
                            <i className="bi bi-x-lg text-xs"></i>
                        </button>
                    </div>
                </div>

                {/* Details body */}
                <div className="p-4 space-y-3">
                    <h3 className="text-base font-bold text-gray-900 dark:text-white leading-snug">{event.title}</h3>

                    <div className="flex items-start gap-2.5 text-xs text-gray-600 dark:text-gray-300">
                        <i className="bi bi-clock text-gray-500 mt-0.5"></i>
                        <div>
                            <div className="font-semibold">{dateHelpers.format(start, 'EEEE, MMMM d, yyyy')}</div>
                            <div className="text-gray-550 dark:text-gray-400 mt-0.5">{dateHelpers.format(start, 'hh:mm a')} - {dateHelpers.format(end, 'hh:mm a')}</div>
                        </div>
                    </div>

                    {/* Room details */}
                    {event.room && (
                        <div className="flex items-start gap-2.5 text-xs text-gray-600 dark:text-gray-300">
                            <i className="bi bi-geo-alt-fill text-gray-500 mt-0.5"></i>
                            <div>
                                <span className="font-semibold">Room: </span>
                                <span className="text-gray-550 dark:text-gray-400">{event.room}</span>
                            </div>
                        </div>
                    )}

                    {/* Status Badge */}
                    <div className="flex gap-2 items-center text-xs">
                        <span className="text-gray-550 dark:text-gray-400">Status:</span>
                        <span className={`px-2 py-0.5 rounded text-[10px] font-bold ${event.status === 'Completed' ? 'bg-green-50 dark:bg-green-950/40 text-green-700 dark:text-green-400 border border-green-200 dark:border-green-900/40' : 'bg-amber-50 dark:bg-amber-950/40 text-amber-700 dark:text-amber-400 border border-amber-200 dark:border-amber-900/40'}`}>
                            {event.status}
                        </span>
                    </div>

                    {/* Creator & Visibility Details */}
                    <div className="flex flex-col gap-1.5 text-xs border-t border-gray-200 dark:border-[#3c3c3c] pt-2.5">
                        <div className="flex justify-between">
                            <span className="text-gray-550 dark:text-gray-400">Created By:</span>
                            <span className="font-semibold text-gray-700 dark:text-white">{event.createdBy}</span>
                        </div>
                        <div className="flex justify-between">
                            <span className="text-gray-550 dark:text-gray-400">Visibility:</span>
                            <span className="font-semibold text-gray-700 dark:text-white capitalize">{event.visibility?.toLowerCase()}</span>
                        </div>
                        {event.visibility?.toUpperCase() === 'SHARED' && (
                            <div className="mt-1">
                                <span className="text-gray-550 dark:text-gray-400 block mb-1">Shared With:</span>
                                <div className="space-y-1 pl-2">
                                    {(() => {
                                        const ids = (event.sharedWith || '').split(',').filter(Boolean);
                                        if (ids.length === 0) return <div className="text-gray-400 italic">No one</div>;
                                        return ids.map(id => {
                                            const u = usersList.find(user => String(user.id) === String(id));
                                            return (
                                                <div key={id} className="flex items-center gap-1.5 text-xs text-gray-750 dark:text-gray-300">
                                                    <i className="bi bi-check-circle-fill text-green-550 text-[10px]"></i>
                                                    <span>{u ? u.displayName : `User ${id}`}</span>
                                                </div>
                                            );
                                        });
                                    })()}
                                </div>
                            </div>
                        )}
                    </div>

                    {/* Notes details */}
                    {event.description && (
                        <div className="flex items-start gap-2.5 text-xs text-gray-600 dark:text-gray-300 border-t border-gray-200 dark:border-[#3c3c3c] pt-2.5">
                            <i className="bi bi-list-stars text-gray-500 mt-0.5"></i>
                            <div className="italic text-gray-550 dark:text-gray-400 whitespace-pre-wrap select-text">
                                "{cleanDescription(event.description)}"
                            </div>
                        </div>
                    )}

                    {/* Task toggle complete btn */}
                    {event.eventType === 'TASK' && canComplete && (
                        <div className="pt-2 border-t border-gray-200 dark:border-[#3c3c3c]">
                            <button
                                onClick={() => {
                                    onToggleComplete(event.id);
                                    onClose();
                                }}
                                className={`w-full py-1.5 rounded font-bold text-xs cursor-pointer transition-colors ${event.status === 'Completed' ? 'bg-gray-100 dark:bg-[#3c3c3c] text-gray-750 dark:text-gray-300 hover:bg-gray-200 dark:hover:bg-[#4c4c4c]' : 'bg-[#1a73e8] text-white hover:bg-blue-600'}`}
                            >
                                {event.status === 'Completed' ? '✓ Completed (Mark Pending)' : 'Mark Completed'}
                            </button>
                        </div>
                    )}

                    {/* Conflicts warnings */}
                    {conflicts.length > 0 && (
                        <div className="border-t border-red-200 dark:border-red-900/40 pt-2.5">
                            <div className="flex items-center gap-2 text-red-650 dark:text-red-400 text-xs font-bold mb-1.5">
                                <i className="bi bi-exclamation-octagon-fill"></i>
                                <span>Schedule Overlaps ({conflicts.length})</span>
                            </div>
                            <ul className="text-[10px] list-disc list-inside text-red-650 dark:text-red-400 bg-red-50 dark:bg-red-950/20 p-2 rounded border border-red-200 dark:border-red-900/20 space-y-1">
                                {conflicts.map((c, idx) => (
                                    <li key={idx} className="leading-normal">{c.message}</li>
                                ))}
                            </ul>
                        </div>
                    )}
                </div>
            </div>
        );
    }

    // --- COMPONENT: CONFLICTPANEL ---
    function ConflictPanel({
        isOpen,
        onClose,
        globalConflicts,
        onNavigateToDate
    }) {
        if (!isOpen) return null;

        return (
            <aside className="w-72 border-l flex flex-col bg-white dark:bg-[#1a1a1a] border-[#dadce0] dark:border-[#3c3c3c] h-full flex-shrink-0 select-none animate-in slide-in-from-right duration-150 z-20">
                <div className="p-4 border-b border-[#dadce0] dark:border-[#3c3c3c] flex items-center justify-between bg-gray-50/50 dark:bg-[#202124]/50">
                    <span className="font-bold text-gray-800 dark:text-[#e8eaed] text-xs uppercase tracking-wider">
                        Conflict Auditor
                    </span>
                    <button onClick={onClose} className="text-gray-450 hover:text-gray-855 dark:hover:text-white"><i className="bi bi-x-lg text-xs"></i></button>
                </div>

                <div className="flex-1 overflow-y-auto p-4 space-y-3">
                    {globalConflicts.length === 0 ? (
                        <div className="text-center text-gray-400 dark:text-gray-600 py-12 px-2">
                            <i className="bi bi-calendar-check text-3xl opacity-40 mb-2 block"></i>
                            <p className="text-xs font-bold">No active conflicts detected!</p>
                            <p className="text-[10px] mt-1">Schedules are verified, room double-bookings and exams separations are clean.</p>
                        </div>
                    ) : (
                        globalConflicts.map(conf => (
                            <div
                                key={conf.id}
                                onClick={() => onNavigateToDate(new Date(conf.date))}
                                className="p-3 bg-red-50/20 dark:bg-red-950/10 border border-red-200/50 dark:border-red-900/20 rounded-lg hover:bg-red-50/40 dark:hover:bg-red-950/20 cursor-pointer transition-colors"
                            >
                                <span className="text-[9px] font-bold text-red-500 uppercase tracking-widest block mb-1">
                                    {conf.type === 'room-booking' ? 'Room Clash' : (conf.type === 'exam-buffer' ? 'Exam Buffer' : 'Time Overlap')}
                                </span>
                                <p className="text-xs font-bold text-gray-900 dark:text-gray-100 select-text leading-tight mb-2">
                                    {conf.description}
                                </p>
                                <div className="flex justify-between items-center text-[10px] text-gray-500 dark:text-gray-400">
                                    <span>{dateHelpers.format(new Date(conf.date), 'MMM d, yyyy')}</span>
                                    <span className="text-[#1a73e8] font-bold">Go To Date →</span>
                                </div>
                            </div>
                        ))
                    )}
                </div>
            </aside>
        );
    }

    // --- COMPONENT: DAYEVENTSPOPOVER ---
    function DayEventsPopover({
        isOpen,
        date,
        events,
        categoryFilters,
        conflictsMap,
        coords,
        onClose,
        onEventClick,
        darkMode
    }) {
        const popoverRef = useRef(null);

        useEffect(() => {
            function handleClickOutside(event) {
                if (popoverRef.current && !popoverRef.current.contains(event.target)) {
                    if (!event.target.closest('.overflow-link')) {
                        onClose();
                    }
                }
            }
            if (isOpen) {
                document.addEventListener('mousedown', handleClickOutside);
            }
            return () => {
                document.removeEventListener('mousedown', handleClickOutside);
            };
        }, [isOpen, onClose]);

        if (!isOpen || !date) return null;

        const dayEvents = events.filter(e => {
            const s = new Date(e.start);
            if (!dateHelpers.isSameDay(s, date)) return false;
            const cat = getEventCategory(e);
            return categoryFilters[cat];
        }).sort((a, b) => new Date(a.start).getTime() - new Date(b.start).getTime());

        const getStyle = () => {
            if (!coords) return {};
            const width = 320;
            const height = 300;
            const padding = 20;

            let left = coords.x - width / 2;
            let top = coords.y - 100;

            if (typeof window !== 'undefined') {
                if (left + width > window.innerWidth) {
                    left = window.innerWidth - width - padding;
                }
                if (left < padding) {
                    left = padding;
                }
                if (top + height > window.innerHeight) {
                    top = window.innerHeight - height - padding;
                }
                if (top < padding) {
                    top = padding;
                }
            }

            return {
                position: 'absolute',
                left: `${left}px`,
                top: `${top}px`,
                zIndex: 45
            };
        };

        const categoryColors = {
            admin:     { bg: 'rgba(59,130,246,0.15)',  text: '#93c5fd', border: '#3b82f6' },
            exams:     { bg: 'rgba(99,102,241,0.15)',  text: '#a5b4fc', border: '#6366f1' },
            tasks:     { bg: 'rgba(245,158,11,0.15)',  text: '#fcd34d', border: '#f59e0b' },
            holidays:  { bg: 'rgba(16,185,129,0.15)',  text: '#6ee7b7', border: '#10b981' },
            birthdays: { bg: 'rgba(236,72,153,0.15)',  text: '#f9a8d4', border: '#ec4899' },
        };
        const lightCategoryColors = {
            admin:     { bg: '#EEF2FF', text: '#4338CA', border: '#818cf8' },
            exams:     { bg: '#EDE9FE', text: '#6D28D9', border: '#7c3aed' },
            tasks:     { bg: '#FFFBEB', text: '#92400E', border: '#d97706' },
            holidays:  { bg: '#D1FAE5', text: '#065F46', border: '#059669' },
            birthdays: { bg: '#FCE7F3', text: '#9D174D', border: '#db2777' },
        };

        const formattedDate = dateHelpers.format(date, 'EEEE, MMMM d');

        return (
            <div 
                ref={popoverRef}
                style={getStyle()} 
                className="w-[320px] max-h-[360px] bg-white dark:bg-[#181824] rounded-xl border border-gray-200 dark:border-indigo-950/40 text-gray-800 dark:text-[#e8eaed] font-sans flex flex-col overflow-hidden shadow-2xl animate-modal"
            >
                {/* Header */}
                <div className="flex items-center justify-between px-4 py-3 bg-gray-50 dark:bg-[#202124] border-b border-gray-200 dark:border-[#3c3c3c]">
                    <span className="text-xs font-bold text-gray-550 dark:text-gray-450 uppercase tracking-wider">
                        {formattedDate}
                    </span>
                    <button onClick={onClose} className="p-1 rounded-full hover:bg-gray-200 dark:hover:bg-white/5 text-gray-450 dark:text-gray-400 hover:text-gray-600 dark:hover:text-white transition-colors">
                        <i className="bi bi-x-lg text-xs"></i>
                    </button>
                </div>

                {/* Event list */}
                <div className="flex-1 overflow-y-auto p-3 space-y-2 max-h-[300px]">
                    {dayEvents.length === 0 ? (
                        <div className="text-center py-6 text-xs text-gray-400 dark:text-gray-500 italic">
                            No events today
                        </div>
                    ) : (
                        dayEvents.map(event => {
                            const conflicts = conflictsMap[event.id] || [];
                            const isConflicting = conflicts.length > 0;
                            const cat = getEventCategory(event);
                            const colors = darkMode ? categoryColors[cat] : lightCategoryColors[cat];
                            const start = new Date(event.start);
                            const end = new Date(event.end);
                            const timeStr = `${dateHelpers.format(start, 'hh:mm a')} – ${dateHelpers.format(end, 'hh:mm a')}`;

                            return (
                                <div
                                    key={event.id}
                                    onClick={(e) => {
                                        e.stopPropagation();
                                        onEventClick(event, { x: e.clientX, y: e.clientY });
                                    }}
                                    className="p-2.5 rounded-lg border text-xs font-semibold flex flex-col gap-1 cursor-pointer transition-all hover:translate-x-0.5 hover:shadow-md"
                                    style={{
                                        background: colors?.bg || 'rgba(99,102,241,0.15)',
                                        color: colors?.text || '#a5b4fc',
                                        border: `1px solid ${colors?.border || '#6366f1'}33`,
                                        borderLeft: `3px solid ${colors?.border || '#6366f1'}`,
                                    }}
                                >
                                    <div className="flex items-center justify-between gap-2">
                                        <span className="truncate text-[12px] font-bold">{event.title}</span>
                                        {isConflicting && (
                                            <span className="w-1.5 h-1.5 rounded-full bg-red-400 flex-shrink-0 animate-pulse" />
                                        )}
                                    </div>
                                    <div className="text-[10px] font-medium opacity-80 flex items-center gap-1">
                                        <i className="bi bi-clock"></i>
                                        <span>{timeStr}</span>
                                        {event.room && (
                                            <>
                                                <span>•</span>
                                                <i className="bi bi-geo-alt"></i>
                                                <span className="truncate">{event.room}</span>
                                            </>
                                        )}
                                    </div>
                                </div>
                            );
                        })
                    )}
                </div>
            </div>
        );
    }

    // --- MAIN REACT CONTAINER (App) ---
    function App() {
        const adminName = window.loggedInAdminName || 'Super Admin';
        const allAdmins = window.allAdminsList || [];

        const [currentDate, setCurrentDate] = useState(new Date());
        const [currentView, setCurrentView] = useState('month');
        const [events, setEvents] = useState([]);
        const [categoryFilters, setCategoryFilters] = useState({
            admin: true,
            exams: true,
            tasks: true,
            holidays: true,
            birthdays: true
        });
        const [searchQuery, setSearchQuery] = useState('');
        const [visibleAdmins, setVisibleAdmins] = useState({});

        useEffect(() => {
            if (allAdmins.length > 0) {
                const initial = {};
                allAdmins.forEach(name => {
                    if (name.toLowerCase() !== adminName.toLowerCase()) {
                        initial[name] = true;
                    }
                });
                setVisibleAdmins(prev => ({ ...initial, ...prev }));
            }
        }, [allAdmins, adminName]);

        const [sidebarOpen, setSidebarOpen] = useState(true);
        const [conflictCheckOpen, setConflictCheckOpen] = useState(false);
        const [darkMode, setDarkMode] = useState(() => {
            const savedTheme = localStorage.getItem("theme");
            if (savedTheme) {
                return savedTheme === "dark";
            }
            return document.body.classList.contains('dark-theme');
        });

        // Synchronize dark-theme status with Tailwind's class-based mode and global classes
        useEffect(() => {
            const themeSwitch = document.getElementById("theme-toggle-switch");
            if (darkMode) {
                document.documentElement.classList.add('dark', 'dark-theme');
                document.body.classList.add('dark', 'dark-theme');
                localStorage.setItem("theme", "dark");
                if (themeSwitch) themeSwitch.checked = true;
            } else {
                document.documentElement.classList.remove('dark', 'dark-theme');
                document.body.classList.remove('dark', 'dark-theme');
                localStorage.setItem("theme", "light");
                if (themeSwitch) themeSwitch.checked = false;
            }
            window.dispatchEvent(new Event('themeChanged'));
        }, [darkMode]);

        // Modals state
        const [modalOpen, setModalOpen] = useState(false);
        const [modalMode, setModalMode] = useState('quick');
        const [selectedCellDate, setSelectedCellDate] = useState(null);
        const [editEvent, setEditEvent] = useState(null);
        const [popoverCoords, setPopoverCoords] = useState(null);

        // Details Popover state
        const [detailOpen, setDetailOpen] = useState(false);
        const [detailEvent, setDetailEvent] = useState(null);
        const [detailCoords, setDetailCoords] = useState(null);

        // Day Events Popover state
        const [dayEventsOpen, setDayEventsOpen] = useState(false);
        const [dayEventsDate, setDayEventsDate] = useState(null);
        const [dayEventsCoords, setDayEventsCoords] = useState(null);

        // Fetch events from Spring Boot REST API
        const loadAllEvents = useCallback(() => {
            fetch('/admin/calendar/events')
                .then(res => res.json())
                .then(data => {
                    // Map backend data model to React Calendar model
                    const mapped = data.map(e => {
                        const roomVal = parseRoomFromDescription(e.description);
                        return {
                            id: e.id,
                            title: e.title,
                            description: e.description,
                            category: e.category,
                            eventType: e.eventType,
                            priority: e.priority,
                            status: e.status,
                            createdBy: e.createdBy,
                            assignedTo: e.assignedTo,
                            visibility: e.visibility,
                            sharedWith: e.sharedWith,
                            start: e.startDatetime,
                            end: e.endDatetime,
                            room: roomVal
                        };
                    });
                    setEvents(mapped);
                })
                .catch(err => console.error("Failed to load events", err));
        }, []);

        const [usersList, setUsersList] = useState([]);

        useEffect(() => {
            loadAllEvents();
            // Fetch users list from database dynamically
            fetch('/admin/calendar/users')
                .then(res => res.json())
                .then(data => setUsersList(data))
                .catch(err => console.error("Failed to load users", err));

            // Sync with backend theme class on window listener
            const handleTheme = () => {
                setDarkMode(document.body.classList.contains('dark-theme'));
            };
            window.addEventListener('themeChanged', handleTheme);
            return () => window.removeEventListener('themeChanged', handleTheme);
        }, [loadAllEvents]);

        // Conflicts Audits
        const { conflictsMap, globalConflicts } = useMemo(() => {
            return detectConflicts(events);
        }, [events]);

        // Filters applied to Grid render only
        const filteredEvents = useMemo(() => {
            return events.filter(e => {
                // Exclude birthday events as per user's strict request
                const isBday = e.title?.toLowerCase().includes('birthday') || e.category?.toLowerCase().includes('birthday');
                if (isBday) return false;

                if (searchQuery.trim()) {
                    const q = searchQuery.toLowerCase();
                    const match = e.title?.toLowerCase().includes(q) || e.description?.toLowerCase().includes(q) || e.room?.toLowerCase().includes(q);
                    if (!match) return false;
                }

                // Checkboxes control visibility only (do not affect private tasks of current user)
                if (e.visibility?.toUpperCase() === 'PUBLIC' && e.createdBy) {
                    const creator = e.createdBy;
                    if (creator.toLowerCase() !== adminName.toLowerCase() && creator !== 'System') {
                        const matchingKey = Object.keys(visibleAdmins).find(
                            k => k.toLowerCase() === creator.toLowerCase()
                        );
                        if (matchingKey && !visibleAdmins[matchingKey]) {
                            return false;
                        }
                    }
                }

                return true;
            });
        }, [events, searchQuery, visibleAdmins, adminName]);

        // Save event handler
        const handleSaveEvent = (data) => {
            const formData = new FormData();
            
            // Format title
            let finalTitle = data.title;
            let finalDesc = data.description;
            if (data.room) {
                finalDesc = `${finalDesc}\n[Room: ${data.room}]`;
            }

            formData.append('title', finalTitle);
            formData.append('description', finalDesc);
            formData.append('category', data.category);
            formData.append('eventType', data.eventType);
            formData.append('priority', data.priority);
            
            formData.append('visibility', data.visibility);
            formData.append('sharedWith', data.sharedWith || '');
            
            formData.append('assignedTo', data.assignedTo);
            formData.append('date', data.dateStr);
            formData.append('startTime', data.startTime);
            formData.append('endTime', data.endTime);

            const performAdd = () => {
                fetch('/admin/calendar/event/add', {
                    method: 'POST',
                    body: formData
                })
                .then(res => res.json())
                .then(response => {
                    if (response.status === 'success') {
                        loadAllEvents();
                    } else {
                        alert('Error saving event: ' + response.message);
                    }
                })
                .catch(err => console.error(err));
            };

            // If editing an existing event: delete old one first, then add updated one
            if (data.id) {
                const params = new URLSearchParams();
                params.append('id', data.id);

                fetch('/admin/calendar/event/delete', {
                    method: 'POST',
                    body: params
                })
                .then(res => res.json())
                .then(response => {
                    if (response.status === 'success') {
                        performAdd();
                    } else {
                        alert('Could not update event: ' + response.message);
                    }
                })
                .catch(err => console.error(err));
            } else {
                performAdd();
            }
        };

        // Delete event handler
        const handleDeleteEvent = (id) => {
            const params = new URLSearchParams();
            params.append('id', id);

            fetch('/admin/calendar/event/delete', {
                method: 'POST',
                body: params
            })
            .then(res => res.json())
            .then(data => {
                if (data.status === 'success') {
                    loadAllEvents();
                } else {
                    alert('Error: ' + data.message);
                }
            })
            .catch(err => console.error(err));
        };

        // Toggle task completion
        const handleToggleComplete = (id) => {
            const params = new URLSearchParams();
            params.append('id', id);

            fetch('/admin/calendar/event/toggle-complete', {
                method: 'POST',
                body: params
            })
            .then(res => res.json())
            .then(data => {
                if (data.status === 'success') {
                    loadAllEvents();
                } else {
                    alert('Error: ' + data.message);
                }
            })
            .catch(err => console.error(err));
        };

        // Navigation controls
        const handleNavigateToday = () => {
            setDayEventsOpen(false);
            setCurrentDate(new Date());
        };
        const handleNavigatePrev = () => {
            setDayEventsOpen(false);
            if (currentView === 'month') setCurrentDate(prev => dateHelpers.subMonths(prev, 1));
            else if (currentView === 'week') setCurrentDate(prev => dateHelpers.subWeeks(prev, 1));
            else setCurrentDate(prev => dateHelpers.subDays(prev, 1));
        };
        const handleNavigateNext = () => {
            setDayEventsOpen(false);
            if (currentView === 'month') setCurrentDate(prev => dateHelpers.addMonths(prev, 1));
            else if (currentView === 'week') setCurrentDate(prev => dateHelpers.addWeeks(prev, 1));
            else setCurrentDate(prev => dateHelpers.addDays(prev, 1));
        };

        const handleCellClick = (date, coords) => {
            setDayEventsOpen(false);
            setDetailOpen(false);
            setEditEvent(null);
            setSelectedCellDate(date);
            setPopoverCoords(coords);
            setModalMode('quick');
            setModalOpen(true);
        };

        const handleEventClick = (event, coords) => {
            setDayEventsOpen(false);
            setModalOpen(false);
            setDetailEvent(event);
            setDetailCoords(coords);
            setDetailOpen(true);
        };

        const handleMoreClick = (date, coords) => {
            setModalOpen(false);
            setDetailOpen(false);
            setDayEventsDate(date);
            setDayEventsCoords(coords);
            setDayEventsOpen(true);
        };

        const handleEditClickFromDetail = (event) => {
            setEditEvent(event);
            setModalMode('full');
            setModalOpen(true);
        };

        const handleCreateButtonClick = () => {
            setDetailOpen(false);
            setEditEvent(null);
            setSelectedCellDate(new Date(currentDate));
            setPopoverCoords(null);
            setModalMode('full');
            setModalOpen(true);
        };

        const handleConflictNavigate = (date) => {
            setCurrentDate(date);
            setCurrentView('day');
        };

        return (
            <div className="flex flex-col h-full w-full overflow-hidden" style={{background: darkMode ? '#0a0a0f' : '#f8f9fa', color: darkMode ? '#f0f0ff' : '#1e2030'}}>
                <Topbar
                    currentDate={currentDate}
                    onNavigateToday={handleNavigateToday}
                    onNavigatePrev={handleNavigatePrev}
                    onNavigateNext={handleNavigateNext}
                    currentView={currentView}
                    setCurrentView={setCurrentView}
                    sidebarOpen={sidebarOpen}
                    setSidebarOpen={setSidebarOpen}
                    searchQuery={searchQuery}
                    setSearchQuery={setSearchQuery}
                    darkMode={darkMode}
                    setDarkMode={setDarkMode}
                    categoryFilters={categoryFilters}
                    setCategoryFilters={setCategoryFilters}
                />

                <div className="flex flex-1 overflow-hidden relative">
                    {sidebarOpen && (
                        <Sidebar
                            events={filteredEvents}
                            currentDate={currentDate}
                            setCurrentDate={setCurrentDate}
                            categoryFilters={categoryFilters}
                            setCategoryFilters={setCategoryFilters}
                            conflictCheckOpen={conflictCheckOpen}
                            setConflictCheckOpen={setConflictCheckOpen}
                            globalConflicts={globalConflicts}
                            onCreateEventClick={handleCreateButtonClick}
                            adminName={adminName}
                            allAdmins={allAdmins}
                            visibleAdmins={visibleAdmins}
                            setVisibleAdmins={setVisibleAdmins}
                        />
                    )}

                    <main className="flex-grow-1 flex flex-col min-w-0 h-full relative overflow-hidden" style={{background: darkMode ? '#0a0a0f' : '#f8f9fa'}}>
                        {currentView === 'month' && (
                            <MonthView
                                currentDate={currentDate}
                                events={filteredEvents}
                                categoryFilters={categoryFilters}
                                conflictsMap={conflictsMap}
                                onCellClick={handleCellClick}
                                onEventClick={handleEventClick}
                                darkMode={darkMode}
                                onMoreClick={handleMoreClick}
                            />
                        )}
                        {currentView === 'week' && (
                            <WeekView
                                currentDate={currentDate}
                                events={filteredEvents}
                                categoryFilters={categoryFilters}
                                conflictsMap={conflictsMap}
                                onCellClick={handleCellClick}
                                onEventClick={handleEventClick}
                            />
                        )}
                        {currentView === 'day' && (
                            <DayView
                                currentDate={currentDate}
                                events={filteredEvents}
                                categoryFilters={categoryFilters}
                                conflictsMap={conflictsMap}
                                onCellClick={handleCellClick}
                                onEventClick={handleEventClick}
                            />
                        )}
                    </main>

                    <ConflictPanel
                        isOpen={conflictCheckOpen}
                        onClose={() => setConflictCheckOpen(false)}
                        globalConflicts={globalConflicts}
                        onNavigateToDate={handleConflictNavigate}
                    />

                    <CreateEventModal
                        isOpen={modalOpen}
                        onClose={() => setModalOpen(false)}
                        onSave={handleSaveEvent}
                        selectedDate={selectedCellDate}
                        editEvent={editEvent}
                        popoverCoords={popoverCoords}
                        mode={modalMode}
                        setMode={setModalMode}
                        allAdmins={allAdmins}
                        adminName={adminName}
                        usersList={usersList}
                    />

                    <EventDetailPopover
                        isOpen={detailOpen}
                        event={detailEvent}
                        coords={detailCoords}
                        onClose={() => setDetailOpen(false)}
                        onEditClick={handleEditClickFromDetail}
                        onDeleteClick={handleDeleteEvent}
                        onToggleComplete={handleToggleComplete}
                        conflicts={detailEvent ? conflictsMap[detailEvent.id] : []}
                        adminName={adminName}
                        usersList={usersList}
                    />

                    <DayEventsPopover
                        isOpen={dayEventsOpen}
                        date={dayEventsDate}
                        events={filteredEvents}
                        categoryFilters={categoryFilters}
                        conflictsMap={conflictsMap}
                        coords={dayEventsCoords}
                        onClose={() => setDayEventsOpen(false)}
                        onEventClick={(event, coords) => {
                            setDayEventsOpen(false);
                            handleEventClick(event, coords);
                        }}
                        darkMode={darkMode}
                    />
                </div>
            </div>
        );
    }

    // --- Mount application ---
    const rootEl = document.getElementById('react-calendar-root');
    if (rootEl) {
        const root = ReactDOM.createRoot(rootEl);
        root.render(<App />);
    }
/*]]>*/
</script>
</body>
</html>
