name: CI/CD – Build & Deploy to Railway

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # ─────────────────────────────────────────────
  # JOB 1: Build & Test
  # ─────────────────────────────────────────────
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout source code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Set up Java 21
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # 3. Cache Maven packages to speed up builds
      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      # 4. Make mvnw executable
      - name: Make mvnw executable
        run: chmod +x mvnw

      # 5. Compile the project
      - name: Compile
        run: ./mvnw clean compile -DskipTests

      # 6. Run tests (skipped if no test DB is configured)
      - name: Run Tests
        run: ./mvnw test --no-transfer-progress
        continue-on-error: true   # Don't fail CI just because integration tests need a real DB

      # 7. Package the JAR
      - name: Package JAR
        run: ./mvnw package -DskipTests --no-transfer-progress

      # 8. Upload the built JAR as a CI artifact
      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: exam-app-jar
          path: target/*.jar
          retention-days: 7

  # ─────────────────────────────────────────────
  # JOB 2: Deploy to Railway (only on push to main)
  # ─────────────────────────────────────────────
  deploy:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        run: railway up --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
